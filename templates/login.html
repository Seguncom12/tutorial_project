<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EduTutorial</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">Edu<span>Tutorial</span></div>
                <h2>Welcome Back</h2>
                <p>Please enter your details to access your classes.</p>
            </div>
            <form action="/login" method="POST" class="auth-form">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="name@example.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-auth">Login to Dashboard</button>
            </form>
            <p class="auth-footer">Don't have an account? <a href="/register">Register here</a></p>
        </div>
    </div>
</body>
</html>
